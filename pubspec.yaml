name: wisebuget
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  lucide_icons_flutter: ^3.1.10
  logging: ^1.3.0
  shared_preferences: ^2.5.4
  get_it: ^9.2.1
  equatable: ^2.0.8
  objectbox: ^5.2.0
  dartz: ^0.10.1
  flutter_bloc: ^9.1.1
  objectbox_flutter_libs: ^5.2.0
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  intl: ^0.20.2
  pie_menu: ^3.3.1
  modal_bottom_sheet: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  objectbox_generator: ^5.2.0

flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Italic.ttf
          style: italic
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
  

